<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Level 2 Course Guide - Contact Me</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            border-bottom: 2px solid #5d9cec;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            color: #333;
        }

        .main-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 10px;
        }

        .nav-btn {
            background-color: #5d9cec;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            min-width: 150px;
            transition: background-color 0.3s;
        }

        .nav-btn:hover {
            background-color: #4a90e2;
        }

        .main-content {
            border-bottom: 2px solid #5d9cec;
            padding-bottom: 40px;
            margin-bottom: 30px;
        }

        .content-wrapper {
            display: flex;
            justify-content: center;
            align-items: stretch;
            gap: 50px;
            padding: 20px;
        }

        .blue-content-box {
            flex: 1; 
            background-color: #5d9cec;
            color: white;
            border-radius: 12px;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-block {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .form-group input, .form-group textarea {
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-family: Arial, sans-serif;
            width: 100%;
            box-sizing: border-box;
        }

        .form-group textarea {
            resize: none;
            height: 100px;
        }

        .submit-btn {
            background-color: white;
            color: #5d9cec;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
            align-self: flex-start;
            margin-top: 5px;
        }

        .submit-btn:hover {
            background-color: #f1f1f1;
            color: #4a90e2;
        }

        .image-block-wrapper {
            padding: 0;
        }

        .level2-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            display: block;
        }

        footer {
            text-align: center;
            padding: 20px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-icons a {
            color: #5d9cec;
            font-size: 28px;
            text-decoration: none;
            transition: color 0.3s;
        }

        .social-icons a:hover {
            color: #4a90e2;
        }

        @media (max-width: 768px) {
            .main-nav {
                flex-wrap: wrap;
            }
            .content-wrapper {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <header>
            <h1>Contact US</h1>
            <nav class="main-nav">
                <a href="index.html" class="nav-btn">Home</a>
                <a href="Achievements Dreamweaver Stanislav.html" class="nav-btn">Achievements</a>
                <a href="FAQ Dreamweaver Stanislav.html" class="nav-btn">FAQ</a>
                <a href="Contact us Dreamweaver Stanislav.html" class="nav-btn">Contact us</a>
            </nav>
        </header>

        <main class="main-content">
            <div class="content-wrapper">
                
                <div class="blue-content-box form-block">
                    <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Message sent successfully!');">
                        <div class="form-group">
                            <label for="name">Name:</label>
                          <input type="text" id="name" name="name" required placeholder="Enter your name">
                        </div>
                        <div class="form-group">
                            <label for="email">Email:</label>
                          <input type="email" id="email" name="email" required placeholder="Enter your email">
                        </div>
                        <div class="form-group">
                            <label for="message">Message:</label>
                            <textarea id="message" name="message" required placeholder="Your message here..."></textarea>
                        </div>
                        <button type="submit" class="submit-btn">Send</button>
                    </form>
                </div>

           
               
              </div>

      
      </main>

        <footer>
          <div class="social-icons">
    <a href="https://www.facebook.com/cardiffandvalecollege" target="_blank"><i class="fab fa-facebook"></i></a>
    <a href="https://x.com/CAVC" target="_blank"><i class="fab fa-twitter"></i></a>
    <a href="https://www.instagram.com/cavcinsta/" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://www.youtube.com/user/CAVCeducation" target="_blank"><i class="fab fa-youtube"></i></a>
</div>
        </footer>

</div>

</body>
</html>
